name: golden_wave
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  animated_splash_screen: ^1.3.0
  smooth_page_indicator: ^1.2.0
  gap: ^3.0.1
  provider: ^6.1.2
  firebase_core: ^3.2.0
  firebase_auth: ^5.1.2
  firebase_messaging: ^15.0.3
  cloud_firestore: ^5.1.0
  modal_progress_hud_nsn: ^0.5.1
  awesome_dialog: ^3.2.1
  iconsax: ^0.0.8
  get: ^4.6.6
  google_nav_bar: ^5.0.6
  loading_animation_widget: ^1.2.1
  table_calendar: ^3.1.2
  google_sign_in: ^6.2.1
  intl: ^0.19.0
  flutter_localization: ^0.2.0
  flutter_localizations:
    sdk: flutter
  dio: ^5.5.0+1
  flutter_inappwebview: ^6.0.0
  flutter_stripe: ^10.2.0
  intl_phone_number_input: ^0.7.4
  shared_preferences: ^2.2.3
  stripe_android: ^10.2.1
  toastification: ^2.1.0
  shimmer: ^3.0.0
  intl_utils: ^2.8.7
  animate_gradient: ^0.0.3
  animated_background: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_slnt,wght.ttf
    - family: AbhayaLibre
      fonts:
        - asset: assets/fonts/AbhayaLibre-ExtraBold.ttf
flutter_intl:
  enabled: true
