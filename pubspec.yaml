name: golden_wave
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  animated_splash_screen: ^1.3.0
  smooth_page_indicator: ^2.0.1
  gap: ^3.0.1
  provider: ^6.1.2
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_messaging: ^16.1.1
  cloud_firestore: ^6.1.2
  modal_progress_hud_nsn: ^0.5.1
  awesome_dialog: ^3.2.1
  iconsax: ^0.0.8
  get: ^4.6.6
  google_nav_bar: ^5.0.6
  loading_animation_widget: ^1.2.1
  table_calendar: ^3.1.2
  google_sign_in: ^7.2.0
  intl: ^0.20.2
  flutter_localization: ^0.3.3
  flutter_localizations:
    sdk: flutter
  dio: ^5.5.0+1
  flutter_inappwebview: ^6.0.0
  flutter_stripe: ^12.3.0
  intl_phone_number_input: ^0.7.4
  shared_preferences: ^2.3.1
  stripe_android: ^12.3.0
  toastification: ^3.0.3
  shimmer: ^3.0.0
  intl_utils: ^2.8.7
  animate_gradient: ^0.0.3
  animated_background: ^2.0.0
  flutter_screenutil: ^5.9.3

  syncfusion_flutter_pdfviewer: ^32.2.5
  device_info_plus: ^12.3.0
  awesome_notifications: ^0.11.0
  flutter_pdfview: ^1.3.2
  page_transition: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/pdf/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_slnt,wght.ttf
    - family: AbhayaLibre
      fonts:
        - asset: assets/fonts/AbhayaLibre-ExtraBold.ttf
flutter_intl:
  enabled: true
